<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code & Markdown → PDF</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/default-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/contrib/auto-render.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar: #111318;
  --sidebar2: #1a1d24;
  --border: #2a2d38;
  --accent: #5b5fcf;
  --accent2: #7c7fff;
  --text: #e2e4ec;
  --muted: #666b80;
  --red: #e95678;
  --green: #3ec97a;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--sidebar);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ── */
#sidebar {
  width: 310px;
  min-width: 310px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}
#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.brand {
  padding: 18px 20px 12px;
  border-bottom: 1px solid var(--border);
}
.brand h1 { font-size: 17px; font-weight: 600; color: #fff; }
.brand p  { font-size: 11px; color: var(--muted); margin-top: 3px; }

/* Mode badge */
#mode-badge {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 6px 20px;
  background: var(--sidebar2);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--muted);
}
#mode-badge .badge {
  padding: 2px 7px;
  border-radius: 10px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.04em;
}
.badge-py  { background: rgba(91,95,207,0.25); color: var(--accent2); }
.badge-md  { background: rgba(62,201,122,0.2); color: var(--green); }

.section {
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* Drop zone */
#drop-zone {
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  padding: 20px 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: var(--sidebar2);
}
#drop-zone.drag-over { border-color: var(--accent2); background: rgba(91,95,207,0.08); }
#drop-zone .dz-main { font-size: 13px; }
#drop-zone .dz-sub  { font-size: 11px; color: var(--muted); margin-top: 3px; }
#drop-zone input[type=file] { display: none; }
#file-name { font-size: 11px; color: var(--accent2); margin-top: 7px; text-align: center; word-break: break-all; min-height: 14px; }

/* Theme pills */
.theme-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.theme-pill {
  padding: 7px 9px;
  border-radius: 7px;
  border: 1.5px solid transparent;
  cursor: pointer;
  font-size: 10px;
  font-weight: 500;
  transition: border-color 0.12s;
  display: flex;
  align-items: center;
  gap: 5px;
}
.theme-pill.active { border-color: var(--accent2) !important; }
.theme-dots { display: flex; gap: 3px; }
.theme-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* Color pickers */
.color-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px 10px; }
.color-row  { display: flex; align-items: center; gap: 7px; }
.color-row label { font-size: 11px; color: var(--muted); flex: 1; cursor: pointer; }
.color-row input[type=color] {
  width: 28px; height: 22px;
  border: 1px solid var(--border); border-radius: 4px;
  padding: 1px; background: transparent; cursor: pointer;
}

/* Controls */
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-row label { font-size: 11px; color: var(--muted); width: 72px; flex-shrink: 0; }
.ctrl-row select {
  flex: 1; background: var(--sidebar2); border: 1px solid var(--border);
  color: var(--text); border-radius: 5px; font-size: 11px; padding: 4px 6px;
}
.ctrl-row input[type=range] { flex: 1; }
.ctrl-row .range-val { font-size: 11px; color: var(--accent2); width: 28px; text-align: right; }

.toggle-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.toggle-row:last-child { margin-bottom: 0; }
.toggle-row label { font-size: 11px; color: var(--muted); cursor: pointer; }

/* Print button */
.btn-print {
  margin: 14px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  width: calc(100% - 40px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s;
}
.btn-print:hover { background: var(--accent2); }

/* ── PREVIEW ── */
#preview-wrap {
  flex: 1;
  overflow: auto;
  background: #0d0d0d;
  display: flex;
  flex-direction: column;
}
#preview-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
#preview-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

#preview-header {
  background: #1a1a1a;
  border-bottom: 1px solid #222;
  padding: 7px 20px;
  font-size: 11px;
  color: #666;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}
#preview-filename { color: #aaa; font-weight: 500; }
#preview-info { margin-left: auto; }

/* No file state */
#no-file {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--muted);
  text-align: center;
  padding: 40px;
}
#no-file p { font-size: 13px; }

/* Code preview */
#code-container { padding: 22px 26px; display: none; }
pre#code-display {
  margin: 0;
  font-size: 13px;
  line-height: 1.6;
  font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
  white-space: pre;
  tab-size: 4;
}
.code-table { border-collapse: collapse; width: 100%; }
.code-table td { padding: 0; vertical-align: top; white-space: pre; font-family: inherit; font-size: inherit; line-height: inherit; }
.ln { color: #555; text-align: right; padding-right: 16px !important; user-select: none; width: 1%; white-space: nowrap; font-variant-numeric: tabular-nums; }

/* Markdown preview */
#md-container { padding: 0; display: none; min-height: 100%; }
.md-body {
  max-width: 820px;
  margin: 0 auto;
  padding: 48px 56px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
  font-size: 15px;
  line-height: 1.7;
  min-height: 100%;
}
.md-body h1 { font-size: 2em; font-weight: 700; border-bottom: 1px solid; padding-bottom: 0.3em; margin: 1em 0 0.5em; }
.md-body h2 { font-size: 1.5em; font-weight: 600; border-bottom: 1px solid; padding-bottom: 0.2em; margin: 1em 0 0.5em; }
.md-body h3 { font-size: 1.25em; font-weight: 600; margin: 0.9em 0 0.4em; }
.md-body h4, .md-body h5, .md-body h6 { font-size: 1em; font-weight: 600; margin: 0.8em 0 0.3em; }
.md-body p  { margin: 0 0 1em; }
.md-body ul, .md-body ol { padding-left: 2em; margin: 0 0 1em; }
.md-body li { margin: 0.3em 0; }
.md-body li > p { margin: 0; }
.md-body pre { border-radius: 6px; padding: 16px; margin: 0 0 1em; overflow: auto; }
.md-body pre code { padding: 0 !important; background: transparent !important; font-size: 0.88em; line-height: 1.5; }
.md-body code { padding: 0.15em 0.4em; border-radius: 4px; font-family: "Cascadia Code", "Fira Code", "Consolas", monospace; font-size: 0.9em; }
.md-body blockquote { margin: 0 0 1em; padding: 0.6em 1em; border-left: 4px solid; }
.md-body blockquote p { margin: 0; }
.md-body hr { border: none; border-top: 1px solid; margin: 1.5em 0; }
.md-body table { border-collapse: collapse; width: 100%; margin: 0 0 1em; }
.md-body th, .md-body td { padding: 8px 14px; border: 1px solid; }
.md-body th { font-weight: 600; }
.md-body tr:nth-child(even) td { background: rgba(0,0,0,0.03); }
.md-body img { max-width: 100%; border-radius: 4px; }
.md-body a { text-decoration: none; }
.md-body a:hover { text-decoration: underline; }
.md-body strong { font-weight: 700; }
.md-body .katex { color: inherit; font-size: 1.05em; }
.md-body .katex-display { overflow-x: auto; margin: 1em 0; }
.md-body .katex-display > .katex { color: inherit; }

/* Print header */
#print-header { display: none; }

/* ── PRINT ── */
@media print {
  body { display: block; height: auto; overflow: visible; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
  #sidebar { display: none !important; }
  #preview-wrap { overflow: visible; display: block; }
  #preview-header { display: none; }
  #no-file { display: none; }

  /* code print */
  #code-container { display: block !important; padding: 0; }
  pre#code-display { font-size: var(--print-font-size, 9pt) !important; line-height: 1.5 !important; }

  /* md print */
  #md-container { display: block !important; }
  .md-body { max-width: 100%; padding: 0; font-size: var(--print-font-size, 10pt) !important; }

  #print-header {
    display: flex !important;
    justify-content: space-between;
    font-size: 8pt;
    padding: 0 0 8pt;
    border-bottom: 0.5pt solid #888;
    margin-bottom: 12pt;
    font-family: monospace;
  }
}
</style>
</head>
<body>

<style id="dynamic-theme"></style>
<style id="md-theme-style"></style>
<style id="page-style">@page { size: A4 portrait; margin: 14mm 16mm; }</style>

<!-- ── SIDEBAR ── -->
<div id="sidebar">
  <div class="brand">
    <h1>Code &amp; Markdown → PDF</h1>
    <p>Drag a .py or .md file, tweak colors, print</p>
  </div>

  <div id="mode-badge">
    <span id="mode-badge-label">Mode:</span>
    <span id="mode-badge-pill" class="badge badge-py">PY</span>
    <span id="mode-badge-file" style="color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px"></span>
  </div>

  <!-- File drop -->
  <div class="section">
    <div class="section-title">File</div>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="display:block;margin:0 auto 7px;opacity:.5">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/><polyline points="9 15 12 12 15 15"/>
      </svg>
      <div class="dz-main">Drop .py or .md here</div>
      <div class="dz-sub">or click to browse</div>
      <input type="file" id="file-input" accept=".py,.pyw,.md,.markdown">
    </div>
    <div id="file-name"></div>
  </div>

  <!-- PY: code themes -->
  <div class="section" id="py-theme-section">
    <div class="section-title">Code Theme</div>
    <div class="theme-grid" id="py-theme-grid"></div>
  </div>

  <!-- PY: token colors -->
  <div class="section" id="py-colors-section">
    <div class="section-title">Token Colors</div>
    <div class="color-grid" id="py-color-pickers"></div>
  </div>

  <!-- MD: doc themes -->
  <div class="section" id="md-theme-section" style="display:none">
    <div class="section-title">Document Style</div>
    <div class="theme-grid" id="md-theme-grid"></div>
  </div>

  <!-- MD: doc colors -->
  <div class="section" id="md-colors-section" style="display:none">
    <div class="section-title">Document Colors</div>
    <div class="color-grid" id="md-color-pickers"></div>
  </div>

  <!-- Page -->
  <div class="section">
    <div class="section-title">Page</div>
    <div class="ctrl-row">
      <label>Size</label>
      <select id="page-size">
        <option value="A4 portrait">A4 Portrait</option>
        <option value="A4 landscape">A4 Landscape</option>
        <option value="letter portrait">Letter Portrait</option>
        <option value="letter landscape">Letter Landscape</option>
        <option value="A3 portrait">A3 Portrait</option>
        <option value="legal portrait">Legal Portrait</option>
      </select>
    </div>
    <div class="ctrl-row">
      <label>Font size</label>
      <input type="range" id="font-size" min="6" max="18" value="9">
      <span class="range-val" id="font-size-val">9pt</span>
    </div>
  </div>

  <!-- Options -->
  <div class="section">
    <div class="section-title">Options</div>
    <div class="toggle-row" id="opt-line-nums">
      <input type="checkbox" id="show-lines" checked>
      <label for="show-lines">Show line numbers</label>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="show-header" checked>
      <label for="show-header">File header &amp; page number</label>
    </div>
  </div>

  <button class="btn-print" onclick="printPDF()">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Print / Save as PDF
  </button>
</div>

<!-- ── PREVIEW ── -->
<div id="preview-wrap">
  <div id="preview-header">
    <span id="preview-filename">No file loaded</span>
    <span id="preview-info"></span>
  </div>

  <div id="no-file">
    <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity=".25">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <p>Drop a .py or .md file to preview it here</p>
  </div>

  <div id="code-container">
    <div id="print-header">
      <span id="ph-filename"></span>
      <span id="ph-center"></span>
      <span id="ph-date"></span>
    </div>
    <pre id="code-display"><code id="hlcode" class="language-python"></code></pre>
  </div>

  <div id="md-container">
    <div class="md-body" id="md-body">
      <div id="print-header-md" style="display:none">
        <span id="phm-filename"></span>
        <span id="phm-date"></span>
      </div>
      <div id="md-content"></div>
    </div>
  </div>
</div>

<script>
// ── THEME DATA ──────────────────────────────────────────────────────────────

const CODE_THEMES = {
  "VSCode Dark+": {
    bg:"#1e1e1e", fg:"#d4d4d4",

const MD_THEMES = {
  "GitHub": {
    bg:"#ffffff", text:"#24292f",
    h1:"#1f2328", h2:"#1f2328", h3:"#1f2328",
    code_bg:"#f6f8fa", code_text:"#24292f",
    bq_border:"#d0d7de", bq_bg:"#f6f8fa",
    link:"#0969da", strong:"#1f2328",

  },
  "Dark Docs": {
    bg:"#0d1117", text:"#e6edf3",
    h1:"#f0f6fc", h2:"#f0f6fc", h3:"#c9d1d9",

    bq_border:"#3d444d", bq_bg:"#161b22",

    bq_border:"#586e75", bq_bg:"#073642",
    link:"#268bd2", strong:"#93a1a1",

  },

const CODE_COLOR_KEYS = [
  ["bg","Background"],["fg","Text"],["keyword","Keyword"],["keyword2","Namespace"],
  ["string","String"],["comment","Comment"],["func","Function"],["cls","Class"],
  ["number","Number"],["builtin","Built-in"],["decorator","Decorator"],["operator","Operator"],
  ["param","Parameter"],["ln","Line #"],
];

const MD_COLOR_KEYS = [
  ["bg","Background"],["text","Body text"],
  ["h1","H1 color"],["h2","H2 color"],["h3","H3 / H4"],
  ["code_bg","Code bg"],["code_text","Code text"],
  ["bq_border","Quote border"],["bq_bg","Quote bg"],
  ["link","Links"],["strong","Bold"],["hr","Dividers"],
];

// ── STATE ───────────────────────────────────────────────────────────────────

let fileMode      = 'py';
let currentSource = null;
let currentFilename = "";
let codeColors    = { ...CODE_THEMES["VSCode Dark+"] };
let mdColors      = { ...MD_THEMES["GitHub"] };
let currentCodeTheme = "VSCode Dark+";
let currentMdTheme   = "GitHub";

// ── SIDEBAR BUILD ───────────────────────────────────────────────────────────

function buildThemeGrid(containerId, themes, currentTheme, onSelect, dotKeys) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = "";
  for (const [name, t] of Object.entries(themes)) {
    const pill = document.createElement("div");
    pill.className = "theme-pill" + (name === currentTheme ? " active" : "");
    pill.style.background = t.bg;
    pill.style.color = t.text || t.fg;
    pill.style.borderColor = (t.bg === "#ffffff" || t.bg === "#fafafa") ? "#ddd" : t.bg;
    pill.dataset.theme = name;

    const dots = document.createElement("div");
    dots.className = "theme-dots";
    for (const k of dotKeys) {
      const d = document.createElement("div");
      d.className = "theme-dot";
      d.style.background = t[k] || (t.text || t.fg);
      dots.appendChild(d);
    }
    const lbl = document.createElement("span");
    lbl.textContent = name;
    lbl.style.lineHeight = "1.2";

    pill.appendChild(dots); pill.appendChild(lbl);
    pill.onclick = () => onSelect(name);
    grid.appendChild(pill);
  }
}

function buildColorPickers(containerId, keys, colorsObj, onChange) {
  const grid = document.getElementById(containerId);
  grid.innerHTML = "";
  for (const [key, label] of keys) {
    const row = document.createElement("div"); row.className = "color-row";
    const lbl = document.createElement("label"); lbl.textContent = label; lbl.htmlFor = containerId + "-" + key;
    const inp = document.createElement("input");
    inp.type = "color"; inp.id = containerId + "-" + key;
    inp.value = colorsObj[key] || "#ffffff";
    inp.addEventListener("input", () => { colorsObj[key] = inp.value; onChange(); });
    row.appendChild(lbl); row.appendChild(inp);
    grid.appendChild(row);
  }
}

function syncCodePickers() {
  for (const [k] of CODE_COLOR_KEYS) {
    const el = document.getElementById("py-color-pickers-" + k);
    if (el && codeColors[k]) el.value = codeColors[k];
  }
}
function syncMdPickers() {
  for (const [k] of MD_COLOR_KEYS) {
    const el = document.getElementById("md-color-pickers-" + k);
    if (el && mdColors[k]) el.value = mdColors[k];
  }
}

function applyCodeTheme(name) {
  currentCodeTheme = name;
  codeColors = { ...CODE_THEMES[name] };
  syncCodePickers();
  document.querySelectorAll("#py-theme-grid .theme-pill").forEach(p =>
    p.classList.toggle("active", p.dataset.theme === name));
  applyCodeColors();
}

function applyMdTheme(name) {
  currentMdTheme = name;
  mdColors = { ...MD_THEMES[name] };
  syncMdPickers();
  document.querySelectorAll("#md-theme-grid .theme-pill").forEach(p =>
    p.classList.toggle("active", p.dataset.theme === name));
  applyMdColors();
}

// ── FILE HANDLING ────────────────────────────────────────────────────────────

function loadFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['py','pyw','md','markdown'].includes(ext)) {
    alert("Please drop a .py or .md file.");
    return;
  }
  currentFilename = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    currentSource = e.target.result;
    if (ext === 'md' || ext === 'markdown') {
      setMode('md');
      renderMarkdown(currentSource, file.name);
    } else {
      setMode('py');
      renderCode(currentSource, file.name);
    }
  };
  reader.readAsText(file);
}

function setMode(mode) {
  fileMode = mode;

  // Show/hide sidebar sections
  document.getElementById("py-theme-section").style.display  = mode === 'py' ? '' : 'none';
  document.getElementById("py-colors-section").style.display = mode === 'py' ? '' : 'none';
  document.getElementById("md-theme-section").style.display  = mode === 'md' ? '' : 'none';
  document.getElementById("md-colors-section").style.display = mode === 'md' ? '' : 'none';
  document.getElementById("opt-line-nums").style.display     = mode === 'py' ? '' : 'none';

  // Show/hide preview panels
  document.getElementById("code-container").style.display = mode === 'py' ? 'block' : 'none';
  document.getElementById("md-container").style.display   = mode === 'md' ? 'block' : 'none';
  document.getElementById("no-file").style.display = 'none';

  // Mode badge
  const badge = document.getElementById("mode-badge");
  badge.style.display = 'flex';
  const pill = document.getElementById("mode-badge-pill");
  pill.textContent = mode.toUpperCase();
  pill.className = "badge badge-" + mode;

  // Apply appropriate colors
  if (mode === 'py') applyCodeColors();
  else applyMdColors();
}

// ── CODE RENDERING ───────────────────────────────────────────────────────────

function renderCode(source, filename) {
  const lines = source.split("\n");
  const result = hljs.highlight(source, { language: "python" });
  const lineHtmls = splitHighlightedLines(result.value);
  const showLn = document.getElementById("show-lines").checked;
  const digits = String(lines.length).length;

  let rows = "";
  for (let i = 0; i < lineHtmls.length; i++) {
    const lnCell = showLn ? `<td class="ln" style="min-width:${digits*8+12}px">${i+1}</td>` : "";
    rows += `<tr>${lnCell}<td class="lc">${lineHtmls[i] || " "}</td></tr>`;
  }
  document.getElementById("hlcode").innerHTML = `<table class="code-table">${rows}</table>`;

  document.getElementById("preview-filename").textContent = filename;
  document.getElementById("preview-info").textContent = `${lines.length} lines · ${(source.length/1024).toFixed(1)} KB`;
  document.getElementById("file-name").textContent = filename;
  document.getElementById("mode-badge-file").textContent = filename;
  document.getElementById("ph-filename").textContent = filename;
  document.getElementById("ph-center").textContent = currentCodeTheme;
  document.getElementById("ph-date").textContent = new Date().toLocaleDateString();
}

function splitHighlightedLines(html) {
  const lines = []; let cur = ""; let openTags = []; let i = 0;
  while (i < html.length) {
    if (html[i] === "&") {
      const end = html.indexOf(";", i);
      if (end !== -1) { cur += html.slice(i, end+1); i = end+1; } else cur += html[i++];
    } else if (html[i] === "<") {
      const end = html.indexOf(">", i);
      if (end === -1) { cur += html[i++]; continue; }
      const tag = html.slice(i, end+1);
      if (tag.startsWith("</")) { if (openTags.length) openTags.pop(); }
      else if (!tag.endsWith("/>")) { const m = tag.match(/^<(\w[\w-]*)/); if (m) openTags.push({name:m[1],full:tag}); }
      cur += tag; i = end+1;
    } else if (html[i] === "\n") {
      const close = openTags.map(t=>`</${t.name}>`).reverse().join("");
      const reopen = openTags.map(t=>t.full).join("");
      lines.push(cur + close); cur = reopen; i++;
    } else cur += html[i++];
  }
  if (cur) lines.push(cur);
  return lines;
}

// ── MARKDOWN RENDERING ───────────────────────────────────────────────────────

// Configure marked with hljs for fenced code blocks
const markedRenderer = new marked.Renderer();
markedRenderer.code = function(tokenOrText, infoOrLang) {
  // marked v9 passes a token object; older versions pass (text, lang)
  const text = typeof tokenOrText === 'object' ? tokenOrText.text : tokenOrText;
  const lang = typeof tokenOrText === 'object' ? tokenOrText.lang : infoOrLang;
  if (!text) return '<pre><code></code></pre>';
  const validLang = lang && hljs.getLanguage(lang) ? lang : null;
  const highlighted = validLang
    ? hljs.highlight(text, { language: validLang }).value
    : hljs.highlightAuto(text).value;
  return `<pre class="hljs-pre"><code class="hljs${validLang ? ' language-'+validLang : ''}">${highlighted}</code></pre>`;
};
marked.use({ renderer: markedRenderer, gfm: true, breaks: false });

function renderMarkdown(source, filename) {
  const html = marked.parse(source);
  document.getElementById("md-content").innerHTML = html;

  if (typeof renderMathInElement !== "undefined") {
    renderMathInElement(document.getElementById("md-content"), {
      delimiters: [
        { left: "$$", right: "$$", display: true  },
        { left: "$",  right: "$",  display: false },
        { left: "\\[", right: "\\]", display: true  },
        { left: "\\(", right: "\\)", display: false },
      ],
      throwOnError: false,
    });
  }

  const lines = source.split("\n").length;
  document.getElementById("preview-filename").textContent = filename;
  document.getElementById("preview-info").textContent = `${lines} lines · ${(source.length/1024).toFixed(1)} KB`;
  document.getElementById("file-name").textContent = filename;
  document.getElementById("mode-badge-file").textContent = filename;
  document.getElementById("phm-filename").textContent = filename;
  document.getElementById("phm-date").textContent = new Date().toLocaleDateString();
  applyMdColors();
}

// ── PRINT ────────────────────────────────────────────────────────────────────

function printPDF() {
  if (!currentSource) { alert("Load a file first."); return; }
  const showHdr = document.getElementById("show-header").checked;

  if (fileMode === 'py') {
    document.getElementById("print-header").style.setProperty("display", showHdr ? "flex" : "none", "important");
  } else {
    document.getElementById("print-header-md").style.setProperty("display", showHdr ? "flex" : "none", "important");
  }
  window.print();
}

// ── CONTROLS ─────────────────────────────────────────────────────────────────

document.getElementById("page-size").addEventListener("change", function() {
  document.getElementById("page-style").textContent = `@page { size: ${this.value}; margin: 14mm 16mm; }`;
});

document.getElementById("font-size").addEventListener("input", function() {
  const v = this.value;
  document.getElementById("font-size-val").textContent = v + "pt";
  document.getElementById("code-display").style.fontSize = v + "pt";
  document.querySelector(".md-body").style.fontSize = v + "pt";
  const pStyle = document.getElementById("page-style");
  pStyle.textContent = pStyle.textContent.replace(/--print-font-size:[^;]+;/, "") + `\n:root{--print-font-size:${v}pt;}`;
});

document.getElementById("show-lines").addEventListener("change", () => {
  if (fileMode === 'py' && currentSource) renderCode(currentSource, currentFilename);
});

// ── DRAG & DROP ───────────────────────────────────────────────────────────────

const dz = document.getElementById("drop-zone");
document.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("drag-over"); });
document.addEventListener("dragleave", e => { if (!e.relatedTarget) dz.classList.remove("drag-over"); });
document.addEventListener("drop", e => {
  e.preventDefault(); dz.classList.remove("drag-over");
  const file = e.dataTransfer?.files?.[0]; if (file) loadFile(file);
});
document.getElementById("file-input").addEventListener("change", e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

buildThemeGrid("py-theme-grid", CODE_THEMES, currentCodeTheme, applyCodeTheme,
  ["keyword","string","comment","func","number"]);
buildThemeGrid("md-theme-grid", MD_THEMES, currentMdTheme, applyMdTheme,
  ["h1","h2","link","code_text","bq_border"]);
buildColorPickers("py-color-pickers", CODE_COLOR_KEYS, codeColors, () => {
  currentCodeTheme = null;
  document.querySelectorAll("#py-theme-grid .theme-pill").forEach(p=>p.classList.remove("active"));
  applyCodeColors();
});
buildColorPickers("md-color-pickers", MD_COLOR_KEYS, mdColors, () => {
  currentMdTheme = null;
  document.querySelectorAll("#md-theme-grid .theme-pill").forEach(p=>p.classList.remove("active"));
  applyMdColors();
});

applyCodeColors();
</script>
