<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python → PDF</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/base16/default-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --sidebar: #111318;
  --sidebar2: #1a1d24;
  --border: #2a2d38;
  --accent: #5b5fcf;
  --accent2: #7c7fff;
  --text: #e2e4ec;
  --muted: #666b80;
  --red: #e95678;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--sidebar);
  color: var(--text);
  height: 100vh;
  display: flex;
  overflow: hidden;
}

/* ── SIDEBAR ─────────────────────────────────────── */
#sidebar {
  width: 310px;
  min-width: 310px;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}

#sidebar::-webkit-scrollbar { width: 4px; }
#sidebar::-webkit-scrollbar-track { background: transparent; }
#sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.brand {
  padding: 20px 20px 14px;
  border-bottom: 1px solid var(--border);
}
.brand h1 {
  font-size: 18px;
  font-weight: 600;
  letter-spacing: -0.3px;
  color: #fff;
}
.brand p {
  font-size: 11px;
  color: var(--muted);
  margin-top: 3px;
}

.section {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
}
.section-title {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 10px;
}

/* Drop zone */
#drop-zone {
  border: 1.5px dashed var(--border);
  border-radius: 10px;
  padding: 22px 12px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  background: var(--sidebar2);
}
#drop-zone.drag-over {
  border-color: var(--accent2);
  background: rgba(91, 95, 207, 0.08);
}
#drop-zone svg { margin-bottom: 8px; opacity: 0.5; }
#drop-zone .dz-main { font-size: 13px; color: var(--text); }
#drop-zone .dz-sub  { font-size: 11px; color: var(--muted); margin-top: 4px; }
#drop-zone input[type=file] { display: none; }

#file-name {
  font-size: 11px;
  color: var(--accent2);
  margin-top: 8px;
  text-align: center;
  word-break: break-all;
  min-height: 16px;
}

/* Theme pills */
.theme-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.theme-pill {
  padding: 7px 10px;
  border-radius: 7px;
  border: 1.5px solid transparent;
  cursor: pointer;
  font-size: 11px;
  font-weight: 500;
  transition: border-color 0.12s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.theme-pill.active { border-color: var(--accent2) !important; }
.theme-dots { display: flex; gap: 3px; }
.theme-dot { width: 8px; height: 8px; border-radius: 50%; }

/* Color pickers */
.color-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px 10px;
}
.color-row {
  display: flex;
  align-items: center;
  gap: 7px;
}
.color-row label {
  font-size: 11px;
  color: var(--muted);
  flex: 1;
  cursor: pointer;
}
.color-row input[type=color] {
  width: 28px;
  height: 22px;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 1px;
  background: transparent;
  cursor: pointer;
}

/* Controls */
.ctrl-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 7px;
}
.ctrl-row:last-child { margin-bottom: 0; }
.ctrl-row label {
  font-size: 11px;
  color: var(--muted);
  width: 80px;
  flex-shrink: 0;
}
.ctrl-row select, .ctrl-row input[type=range] {
  flex: 1;
  background: var(--sidebar2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 5px;
  font-size: 11px;
  padding: 4px 6px;
  appearance: none;
}
.ctrl-row .range-val {
  font-size: 11px;
  color: var(--accent2);
  width: 28px;
  text-align: right;
}
.radio-group { display: flex; gap: 6px; flex: 1; }
.radio-group label {
  width: auto;
  display: flex;
  align-items: center;
  gap: 4px;
  cursor: pointer;
  color: var(--text);
  font-size: 11px;
}
.radio-group input { cursor: pointer; }

.toggle-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}
.toggle-row label {
  font-size: 11px;
  color: var(--muted);
  cursor: pointer;
}
.toggle-row input[type=checkbox] { cursor: pointer; }

/* Print button */
.btn-print {
  margin: 16px 20px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 11px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  width: calc(100% - 40px);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.15s;
}
.btn-print:hover { background: var(--accent2); }
.btn-print svg { flex-shrink: 0; }

/* No-file state */
#no-file {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  gap: 12px;
  color: var(--muted);
  text-align: center;
  padding: 40px;
}
#no-file svg { opacity: 0.25; }
#no-file p { font-size: 13px; }

/* ── PREVIEW ─────────────────────────────────────── */
#preview-wrap {
  flex: 1;
  overflow: auto;
  background: #0d0d0d;
  display: flex;
  flex-direction: column;
}
#preview-wrap::-webkit-scrollbar { width: 6px; height: 6px; }
#preview-wrap::-webkit-scrollbar-track { background: transparent; }
#preview-wrap::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

#preview-header {
  background: #1a1a1a;
  border-bottom: 1px solid #222;
  padding: 8px 20px;
  font-size: 11px;
  color: #666;
  display: flex;
  align-items: center;
  gap: 10px;
  position: sticky;
  top: 0;
  z-index: 10;
  flex-shrink: 0;
}
#preview-filename { color: #aaa; font-weight: 500; }
#preview-info { margin-left: auto; }

#code-container {
  padding: 24px 28px;
  min-height: 100%;
}
#code-container.hidden { display: none; }

pre#code-display {
  margin: 0;
  font-size: 13px;
  line-height: 1.6;
  font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
  white-space: pre;
  tab-size: 4;
}

/* Line number table */
.code-table {
  border-collapse: collapse;
  width: 100%;
}
.code-table td {
  padding: 0;
  vertical-align: top;
  white-space: pre;
  font-family: inherit;
  font-size: inherit;
  line-height: inherit;
}
.ln { /* line number */
  color: #555;
  text-align: right;
  padding-right: 16px !important;
  user-select: none;
  width: 1%;
  white-space: nowrap;
  font-variant-numeric: tabular-nums;
}
.lc { /* line content */
  padding-left: 0;
}

/* ── PRINT ─────────────────────────────────────────── */
@media print {
  body {
    display: block;
    height: auto;
    overflow: visible;
    background: var(--print-bg, #1e1e1e) !important;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  #sidebar { display: none !important; }
  #preview-wrap {
    overflow: visible;
    background: var(--print-bg, #1e1e1e) !important;
    display: block;
  }
  #preview-header { display: none; }
  #no-file { display: none; }
  #code-container {
    padding: 0;
    display: block !important;
  }
  pre#code-display {
    font-size: var(--print-font-size, 9pt) !important;
    line-height: 1.5 !important;
  }
  .code-table { width: 100%; }

  /* Print header injected via JS */
  #print-header {
    display: flex !important;
    justify-content: space-between;
    font-size: 8pt;
    padding: 6pt 0 8pt;
    border-bottom: 0.5pt solid #555;
    margin-bottom: 10pt;
    font-family: monospace;
  }
}
#print-header { display: none; }

/* hljs token override (injected dynamically via #dynamic-theme) */
</style>
</head>
<body>

<style id="dynamic-theme"></style>
<style id="page-style">@page { size: A4 portrait; margin: 14mm 16mm; }</style>

<!-- ── SIDEBAR ── -->
<div id="sidebar">
  <div class="brand">
    <h1>Python → PDF</h1>
    <p>Drag a .py file, tweak colors, print</p>
  </div>

  <!-- Drop zone -->
  <div class="section">
    <div class="section-title">File</div>
    <div id="drop-zone" onclick="document.getElementById('file-input').click()">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4" style="display:block;margin:0 auto 8px">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
        <polyline points="14 2 14 8 20 8"/>
        <line x1="12" y1="18" x2="12" y2="12"/>
        <polyline points="9 15 12 12 15 15"/>
      </svg>
      <div class="dz-main">Drop .py file here</div>
      <div class="dz-sub">or click to browse</div>
      <input type="file" id="file-input" accept=".py,.pyw">
    </div>
    <div id="file-name"></div>
  </div>

  <!-- Preset themes -->
  <div class="section">
    <div class="section-title">Preset Theme</div>
    <div class="theme-grid" id="theme-grid"></div>
  </div>

  <!-- Manual color pickers -->
  <div class="section">
    <div class="section-title">Colors</div>
    <div class="color-grid" id="color-pickers"></div>
  </div>

  <!-- Page setup -->
  <div class="section">
    <div class="section-title">Page</div>
    <div class="ctrl-row">
      <label>Size</label>
      <select id="page-size">
        <option value="A4 portrait">A4 Portrait</option>
        <option value="A4 landscape">A4 Landscape</option>
        <option value="letter portrait">Letter Portrait</option>
        <option value="letter landscape">Letter Landscape</option>
        <option value="A3 portrait">A3 Portrait</option>
        <option value="legal portrait">Legal Portrait</option>
      </select>
    </div>
    <div class="ctrl-row">
      <label>Font size</label>
      <input type="range" id="font-size" min="6" max="16" value="9">
      <span class="range-val" id="font-size-val">9pt</span>
    </div>
  </div>

  <!-- Options -->
  <div class="section">
    <div class="section-title">Options</div>
    <div class="toggle-row">
      <input type="checkbox" id="show-lines" checked>
      <label for="show-lines">Show line numbers</label>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="show-header" checked>
      <label for="show-header">Show file header</label>
    </div>
  </div>

  <button class="btn-print" onclick="printPDF()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <polyline points="6 9 6 2 18 2 18 9"/>
      <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
      <rect x="6" y="14" width="12" height="8"/>
    </svg>
    Print / Save as PDF
  </button>
</div>

<!-- ── PREVIEW ── -->
<div id="preview-wrap">
  <div id="preview-header">
    <span id="preview-filename">No file loaded</span>
    <span id="preview-info"></span>
  </div>

  <div id="no-file">
    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
    </svg>
    <p>Drop a Python file to see it here</p>
  </div>

  <div id="code-container" class="hidden">
    <div id="print-header">
      <span id="ph-filename"></span>
      <span id="ph-theme"></span>
      <span id="ph-page">Page 1</span>
    </div>
    <pre id="code-display"><code id="hlcode" class="language-python"></code></pre>
  </div>
</div>

<script>
// ── THEME DEFINITIONS ──────────────────────────────────────────────────────
const THEMES = {
  "VSCode Dark+": {
    bg: "#1e1e1e", fg: "#d4d4d4",
    keyword: "#569cd6", keyword2: "#c586c0",
    string: "#ce9178", stringdoc: "#6a9955",
    comment: "#6a9955",
    func: "#dcdcaa", cls: "#4ec9b0",
    number: "#b5cea8", builtin: "#4ec9b0",
    decorator: "#dcdcaa", operator: "#d4d4d4",
    param: "#9cdcfe", ln: "#858585",
  },
  "VSCode Light+": {
    bg: "#ffffff", fg: "#000000",
    keyword: "#0000ff", keyword2: "#af00db",
    string: "#a31515", stringdoc: "#008000",
    comment: "#008000",
    func: "#795e26", cls: "#267f99",
    number: "#098658", builtin: "#267f99",
    decorator: "#795e26", operator: "#000000",
    param: "#001080", ln: "#aaaaaa",
  },
  "Monokai": {
    bg: "#272822", fg: "#f8f8f2",
    keyword: "#f92672", keyword2: "#f92672",
    string: "#e6db74", stringdoc: "#75715e",
    comment: "#75715e",
    func: "#a6e22e", cls: "#a6e22e",
    number: "#ae81ff", builtin: "#66d9ef",
    decorator: "#a6e22e", operator: "#f92672",
    param: "#fd971f", ln: "#75715e",
  },
  "Dracula": {
    bg: "#282a36", fg: "#f8f8f2",
    keyword: "#ff79c6", keyword2: "#ff79c6",
    string: "#f1fa8c", stringdoc: "#6272a4",
    comment: "#6272a4",
    func: "#50fa7b", cls: "#8be9fd",
    number: "#bd93f9", builtin: "#8be9fd",
    decorator: "#50fa7b", operator: "#ff79c6",
    param: "#ffb86c", ln: "#6272a4",
  },
  "Solarized Dark": {
    bg: "#002b36", fg: "#839496",
    keyword: "#859900", keyword2: "#859900",
    string: "#2aa198", stringdoc: "#586e75",
    comment: "#586e75",
    func: "#268bd2", cls: "#268bd2",
    number: "#d33682", builtin: "#2aa198",
    decorator: "#b58900", operator: "#657b83",
    param: "#cb4b16", ln: "#586e75",
  },
  "GitHub Light": {
    bg: "#ffffff", fg: "#24292e",
    keyword: "#d73a49", keyword2: "#d73a49",
    string: "#032f62", stringdoc: "#6a737d",
    comment: "#6a737d",
    func: "#6f42c1", cls: "#6f42c1",
    number: "#005cc5", builtin: "#005cc5",
    decorator: "#6f42c1", operator: "#d73a49",
    param: "#24292e", ln: "#959da5",
  },
};

// Color picker definitions: [key, label, hljs-classes...]
const COLOR_KEYS = [
  ["bg",        "Background",  null],
  ["fg",        "Text",        ".hljs"],
  ["keyword",   "Keyword",     ".hljs-keyword"],
  ["keyword2",  "Namespace",   ".hljs-keyword.hljs-type,.hljs-built_in-sub"],
  ["string",    "String",      ".hljs-string"],
  ["comment",   "Comment",     ".hljs-comment"],
  ["func",      "Function",    ".hljs-title.function_"],
  ["cls",       "Class",       ".hljs-title.class_"],
  ["number",    "Number",      ".hljs-number"],
  ["builtin",   "Built-in",   ".hljs-built_in"],
  ["decorator", "Decorator",   ".hljs-meta"],
  ["operator",  "Operator",    ".hljs-operator"],
  ["param",     "Parameter",   ".hljs-params"],
  ["ln",        "Line #",      null],
];

// Current color state
let colors = { ...THEMES["VSCode Dark+"] };
let currentTheme = "VSCode Dark+";
let currentFile = null;
let currentFilename = "";

// ── BUILD SIDEBAR ──────────────────────────────────────────────────────────
function buildThemeGrid() {
  const grid = document.getElementById("theme-grid");
  for (const [name, t] of Object.entries(THEMES)) {
    const pill = document.createElement("div");
    pill.className = "theme-pill" + (name === currentTheme ? " active" : "");
    pill.style.background = t.bg;
    pill.style.color = t.fg;
    pill.style.borderColor = t.bg === "#ffffff" ? "#ddd" : t.bg;
    pill.dataset.theme = name;

    const dots = document.createElement("div");
    dots.className = "theme-dots";
    for (const c of [t.keyword, t.string, t.comment, t.func, t.number]) {
      const d = document.createElement("div");
      d.className = "theme-dot";
      d.style.background = c;
      dots.appendChild(d);
    }
    const lbl = document.createElement("span");
    lbl.textContent = name;
    lbl.style.fontSize = "10px";
    lbl.style.lineHeight = "1.2";

    pill.appendChild(dots);
    pill.appendChild(lbl);
    pill.onclick = () => applyTheme(name);
    grid.appendChild(pill);
  }
}

function buildColorPickers() {
  const grid = document.getElementById("color-pickers");
  for (const [key, label] of COLOR_KEYS) {
    const row = document.createElement("div");
    row.className = "color-row";

    const lbl = document.createElement("label");
    lbl.textContent = label;
    lbl.htmlFor = "cp-" + key;

    const inp = document.createElement("input");
    inp.type = "color";
    inp.id = "cp-" + key;
    inp.value = colors[key] || "#ffffff";
    inp.addEventListener("input", () => {
      colors[key] = inp.value;
      currentTheme = null;
      document.querySelectorAll(".theme-pill").forEach(p => p.classList.remove("active"));
      applyColors();
    });

    row.appendChild(lbl);
    row.appendChild(inp);
    grid.appendChild(row);
  }
}

function syncPickerValues() {
  for (const [key] of COLOR_KEYS) {
    const inp = document.getElementById("cp-" + key);
    if (inp && colors[key]) inp.value = colors[key];
  }
}

function applyTheme(name) {
  currentTheme = name;
  colors = { ...THEMES[name] };
  syncPickerValues();
  document.querySelectorAll(".theme-pill").forEach(p => {
    p.classList.toggle("active", p.dataset.theme === name);
  });
  applyColors();
}

// ── CSS INJECTION ──────────────────────────────────────────────────────────
function applyColors() {
  const c = colors;
  const bg = c.bg || "#1e1e1e";

  // Build dynamic CSS
  const css = `
#preview-wrap, pre#code-display, #code-container { background: ${bg} !important; }
pre#code-display { color: ${c.fg || "#d4d4d4"} !important; }
#code-display .hljs { background: ${bg} !important; color: ${c.fg || "#d4d4d4"} !important; }
#code-display .hljs-keyword { color: ${c.keyword} !important; font-weight: bold; }
#code-display .hljs-keyword.hljs-type { color: ${c.keyword2 || c.keyword} !important; }
#code-display .hljs-string { color: ${c.string} !important; }
#code-display .hljs-comment { color: ${c.comment} !important; font-style: italic; }
#code-display .hljs-title.function_ { color: ${c.func} !important; }
#code-display .hljs-title.class_ { color: ${c.cls} !important; }
#code-display .hljs-number { color: ${c.number} !important; }
#code-display .hljs-built_in { color: ${c.builtin} !important; }
#code-display .hljs-meta { color: ${c.decorator} !important; }
#code-display .hljs-operator { color: ${c.operator} !important; }
#code-display .hljs-params { color: ${c.param} !important; }
#code-display .hljs-literal { color: ${c.number} !important; }
#code-display .hljs-variable.language_ { color: ${c.builtin} !important; }
#code-display .hljs-attr { color: ${c.keyword} !important; }
#code-display .hljs-subst { color: ${c.fg} !important; }
.ln { color: ${c.ln || "#555"} !important; }

@media print {
  :root { --print-bg: ${bg}; }
  body { background: ${bg} !important; }
  pre#code-display { background: ${bg} !important; color: ${c.fg} !important; }
  #code-display .hljs { background: ${bg} !important; color: ${c.fg} !important; }
  #code-display .hljs-keyword { color: ${c.keyword} !important; font-weight: bold; }
  #code-display .hljs-string { color: ${c.string} !important; }
  #code-display .hljs-comment { color: ${c.comment} !important; font-style: italic; }
  #code-display .hljs-title.function_ { color: ${c.func} !important; }
  #code-display .hljs-title.class_ { color: ${c.cls} !important; }
  #code-display .hljs-number { color: ${c.number} !important; }
  #code-display .hljs-built_in { color: ${c.builtin} !important; }
  #code-display .hljs-meta { color: ${c.decorator} !important; }
  #code-display .hljs-operator { color: ${c.operator} !important; }
  #code-display .hljs-params { color: ${c.param} !important; }
  #code-display .hljs-literal { color: ${c.number} !important; }
  #code-display .hljs-variable.language_ { color: ${c.builtin} !important; }
  .ln { color: ${c.ln || "#555"} !important; }
  #print-header { color: ${c.ln || "#777"} !important; border-color: ${c.ln || "#555"} !important; }
}
  `;
  document.getElementById("dynamic-theme").textContent = css;
}

// ── FILE HANDLING ─────────────────────────────────────────────────────────
function loadFile(file) {
  if (!file || !file.name.match(/\.(py|pyw)$/i)) {
    alert("Please drop a Python (.py) file.");
    return;
  }
  currentFilename = file.name;
  const reader = new FileReader();
  reader.onload = e => renderCode(e.target.result, file.name);
  reader.readAsText(file);
}

function renderCode(source, filename) {
  currentFile = source;
  const lines = source.split("\n");
  const lineCount = lines.length;

  // highlight.js
  const result = hljs.highlight(source, { language: "python" });
  const highlightedHtml = result.value;

  // Split highlighted HTML into per-line segments
  const lineHtmls = splitIntoLines(highlightedHtml);
  const showLineNums = document.getElementById("show-lines").checked;
  const digits = String(lineCount).length;

  // Build table rows
  let tableRows = "";
  for (let i = 0; i < lineHtmls.length; i++) {
    const lnCell = showLineNums
      ? `<td class="ln" style="min-width:${digits * 8 + 12}px">${i + 1}</td>`
      : "";
    tableRows += `<tr>${lnCell}<td class="lc">${lineHtmls[i] || " "}</td></tr>`;
  }

  document.getElementById("hlcode").innerHTML =
    `<table class="code-table">${tableRows}</table>`;

  // Update UI
  document.getElementById("preview-filename").textContent = filename;
  document.getElementById("preview-info").textContent =
    `${lineCount} lines · ${(source.length / 1024).toFixed(1)} KB`;
  document.getElementById("file-name").textContent = filename;
  document.getElementById("ph-filename").textContent = filename;
  document.getElementById("no-file").style.display = "none";
  document.getElementById("code-container").classList.remove("hidden");
}

// Split highlight.js HTML output into lines, keeping open tags balanced
function splitIntoLines(html) {
  const lines = [];
  let current = "";
  let openTags = [];
  let i = 0;

  while (i < html.length) {
    if (html[i] === "&") {
      // HTML entity
      const end = html.indexOf(";", i);
      if (end !== -1) {
        current += html.slice(i, end + 1);
        i = end + 1;
      } else {
        current += html[i++];
      }
    } else if (html[i] === "<") {
      const end = html.indexOf(">", i);
      if (end === -1) { current += html[i++]; continue; }
      const tag = html.slice(i, end + 1);
      if (tag.startsWith("</")) {
        if (openTags.length) openTags.pop();
      } else if (!tag.endsWith("/>")) {
        const m = tag.match(/^<(\w[\w-]*)/);
        if (m) openTags.push({ name: m[1], full: tag });
      }
      current += tag;
      i = end + 1;
    } else if (html[i] === "\n") {
      // close open tags, save line, reopen
      const close = openTags.map(t => `</${t.name}>`).reverse().join("");
      const reopen = openTags.map(t => t.full).join("");
      lines.push(current + close);
      current = reopen;
      i++;
    } else {
      current += html[i++];
    }
  }
  if (current) lines.push(current);
  return lines;
}

// ── PRINT ──────────────────────────────────────────────────────────────────
function printPDF() {
  if (!currentFile) { alert("Load a Python file first."); return; }
  const themeName = currentTheme || "Custom";
  document.getElementById("ph-filename").textContent = currentFilename;
  document.getElementById("ph-theme").textContent = themeName;
  document.getElementById("ph-page").textContent =
    new Date().toLocaleDateString();
  const showHdr = document.getElementById("show-header").checked;
  document.getElementById("print-header").style.setProperty(
    "display", showHdr ? "flex" : "none", "important"
  );
  window.print();
}

// ── DRAG & DROP ────────────────────────────────────────────────────────────
const dz = document.getElementById("drop-zone");
document.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("drag-over"); });
document.addEventListener("dragleave", e => { if (!e.relatedTarget) dz.classList.remove("drag-over"); });
document.addEventListener("drop", e => {
  e.preventDefault();
  dz.classList.remove("drag-over");
  const file = e.dataTransfer?.files?.[0];
  if (file) loadFile(file);
});
document.getElementById("file-input").addEventListener("change", e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

// ── PAGE SIZE ──────────────────────────────────────────────────────────────
document.getElementById("page-size").addEventListener("change", function() {
  document.getElementById("page-style").textContent =
    `@page { size: ${this.value}; margin: 14mm 16mm; }`;
});

// ── FONT SIZE ──────────────────────────────────────────────────────────────
document.getElementById("font-size").addEventListener("input", function() {
  const v = this.value;
  document.getElementById("font-size-val").textContent = v + "pt";
  document.getElementById("code-display").style.fontSize = v + "pt";
  document.querySelector("#dynamic-theme").textContent +=
    `\npre#code-display { font-size: ${v}pt !important; }`;
  // Re-apply to keep other styles
  applyColors();
  document.getElementById("code-display").style.fontSize = v + "pt";
});

// ── LINE NUMBERS TOGGLE ────────────────────────────────────────────────────
document.getElementById("show-lines").addEventListener("change", () => {
  if (currentFile) renderCode(currentFile, currentFilename);
});

// ── INIT ───────────────────────────────────────────────────────────────────
buildThemeGrid();
buildColorPickers();
applyColors();
</script>
